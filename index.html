<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Undersea Big Rich Man - Large Grid</title>
<style>
:root {
    --bg-color: #f4f1ea;
    --text-main: #333333;
    --text-sub: #7f7f7f;
    --border-color: #d1d1d1;
    --accent-red: #a63d40;
    --accent-blue: #607d8b;
    --accent-green: #849483;
    --muji-tan: #e8e2d6;
}

h1 { font-size: 15px; margin-bottom: 2px; }

* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
body { 
    font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
    background-color: var(--bg-color); 
    color: var(--text-main); 
    padding: 4px; 
    display: flex; flex-direction: column; align-items: center; 
}

/* 遊戲地圖放大 */
#game-container { 
    width: 98vw; 
    max-width: 500px; 
    position: relative; 
}

/* 10x10 棋盤：重點在於格子尺寸感 */
.board { 
    display: grid; 
    grid-template-columns: repeat(10, 1fr); 
    grid-template-rows: repeat(10, 1fr); 
    gap: 1.5px; /* 增加間隙讓格子更分明 */
    background: var(--border-color); 
    border: 2px solid var(--border-color);
    width: 100%; 
    aspect-ratio: 1 / 1; 
    position: relative;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.cell { 
    background: #fff; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; /* 內容居中 */
    align-items: center;
    padding: 7px; 
    position: relative; 
}

/* 特殊格樣式維持，但飽和度稍微提高 */
.cell.start-team0 { background: #fee2e2; }
.cell.start-team1 { background: #e0f2fe; }
.cell.start-team2 { background: #f0fdf4; }
.cell.station { background: var(--muji-tan); }
.cell.event-cell { background: #f5f3ff; }

.cell-name { 
    font-size: 11px; 
    font-weight: 700; 
    position: absolute; 
    top: 1px; 
    left: 1px; 
    color: var(--text-sub);
    transform: scale(0.8);
    transform-origin: top left;
}

/* 垃圾圖示變大 */
.cell-info { 
    font-size: 14px; /* 從 8px 大幅增加到 14px */
    line-height: 1;
}

/* 棋子也稍微放大 */
.player-container { 
    display: flex; 
    gap: 1px; 
    position: absolute; 
    bottom: 1px; 
    right: 1px; 
    flex-wrap: wrap; 
    justify-content: flex-end;
    max-width: 90%; 
}
.player-token { 
    width: 11px; height: 11px; border-radius: 50%; color: #fff; font-size: 7px; 
    display: flex; align-items: center; justify-content: center; font-weight: bold;
    border: 0.5px solid rgba(255,255,255,0.8);
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
.t0-token { background: var(--accent-red); }
.t1-token { background: var(--accent-blue); }
.t2-token { background: var(--accent-green); }

/* 中間資訊區：維持比例但排版緊湊 */
.center-info {
    grid-column: 2 / 10;
    grid-row: 2 / 10;
    background: rgba(255, 255, 255, 0.95);
    z-index: 5;
    display: flex;
    flex-direction: column;
    padding: 8% 4%;
    justify-content: space-evenly;
    text-align: center;
}

.center-turn { font-size: 14px; font-weight: 700; border-bottom: 1px solid #eee; padding-bottom: 4px; }
.center-scores { display: flex; justify-content: space-around; width: 100%; }
.score-item { display: flex; flex-direction: column; }
.score-val { font-size: 18px; font-weight: 800; }
.score-label { font-size: 9px; opacity: 0.7; }

.center-hp { font-size: 10px; color: #555; background: #fafaf8; padding: 6px; border-radius: 3px; line-height: 1.4; border: 1px solid #f0f0f0; }

/* 控制區 */
.controls { width: 100%; margin-top: 10px; }
.action-row { display: flex; gap: 6px; margin-bottom: 8px; }
button { 
    flex: 1; padding: 12px 2px; font-size: 13px; cursor: pointer; 
    background: #333; color: #fff; border: none; border-radius: 4px;
}
button:disabled { background: #ddd; color: #999; }

.hand-container { 
    display: flex; gap: 8px; overflow-x: auto; padding: 5px 0;
    -webkit-overflow-scrolling: touch;
}
.card-option { 
    min-width: 118px; background: #fff; padding: 10px; border: 1px solid #ddd; 
    border-radius: 4px; flex-shrink: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
.card-option b { font-size: 12px; display: block; margin-bottom: 2px; }
.card-option span { font-size: 9px; color: #777; }
.card-option.selected { border: 2px solid #333; padding: 9px; }

#dice-result { height: 20px; font-weight: bold; color: var(--accent-red); margin-bottom: 5px; text-align: center; font-size: 14px; }
</style>
</head>
<body>

<div id="game-container">
    <div class="board" id="board">
        <div class="center-info">
            <div id="current-turn" class="center-turn">P1</div>
            
            <div class="center-scores">
                <div class="score-item" style="color:var(--accent-red)">
                    <span id="t0-score" class="score-val">0</span>
                    <span class="score-label">RED</span>
                </div>
                <div class="score-item" style="color:var(--accent-blue)">
                    <span id="t1-score" class="score-val">0</span>
                    <span class="score-label">BLUE</span>
                </div>
                <div class="score-item" style="color:var(--accent-green)">
                    <span id="t2-score" class="score-val">0</span>
                    <span class="score-label">GREEN</span>
                </div>
            </div>

            <div id="p-hp-info" class="center-hp">P1-P6 HP STATUS</div>
            <h1>undersea big rich man</h1>
            <div id="dice-result"></div>
        </div>
    </div>

    <div class="controls">
        <div class="action-row">
            <button id="roll-btn" onclick="rollDice()">🎲 擲骰移動</button>
            <button id="card-btn" onclick="playCard()" disabled>🧬 發動卡片</button>
            <button id="skip-card-btn" onclick="skipCard()" disabled>結束</button>
        </div>

        <div class="hand-container" id="hand-cards"></div>
    </div>
</div>

<script>
// --- 數據結構 (維持 36 格路徑) ---
const garbageTypes = [
    { key: "tire", name: "輪胎", score: 5, icon: "🛞" },
    { key: "net", name: "漁網", score: 4, icon: "🕸️" },
    { key: "bag", name: "塑膠袋", score: 3, icon: "🛍️" },
    { key: "bottle", name: "寶特瓶", score: 2, icon: "🍾" },
    { key: "straw", name: "吸管", score: 1, icon: "🥤" }
];

const cardPool = [
    { id: "shrimp", name: "🦐 爆炸蝦", desc: "前進 2 格" },
    { id: "shark", name: "🦈 冰凍鯊", desc: "前進 4 格" },
    { id: "starfish", name: "⭐ 生命之星", desc: "隊友回 HP" },
    { id: "whale", name: "🐋 鯨心膽跳", desc: "全隊滿 HP" },
    { id: "turtle", name: "🐢 龜甲萬", desc: "免疫傷害" },
    { id: "octopus", name: "🐙 章魚墨客", desc: "敵移動減半" },
    { id: "shell", name: "🐚 貝感欣慰", desc: "飛向垃圾格" },
    { id: "fish", name: "🐟 清道夫", desc: "吃垃圾回 HP" }
];

const mapConfig = [];
const eventPos = [3, 7, 12, 16, 21, 25, 30, 34];
for (let i = 0; i < 36; i++) {
    if (i === 0) mapConfig.push({ name: "R-START", type: "start-team0" });
    else if (i === 9) mapConfig.push({ name: "B-START", type: "start-team1" });
    else if (i === 18) mapConfig.push({ name: "G-START", type: "start-team2" });
    else if ([5, 14, 23, 32].includes(i)) mapConfig.push({ name: "回收站", type: "station" });
    else if (eventPos.includes(i)) mapConfig.push({ name: "事件", type: "event-cell" });
    else {
        let randG = Math.random() > 0.4 ? garbageTypes[Math.floor(Math.random()*5)] : null;
        mapConfig.push({ name: i, type: "ocean", garbage: randG });
    }
}

// 10x10 邊緣映射
const gridMapping = [];
for (let col = 0; col < 10; col++) gridMapping.push(col);
for (let row = 1; row <= 8; row++) {
    for (let col = 0; col < 10; col++) {
        if (col === 0) gridMapping.push(36 - row);
        else if (col === 9) gridMapping.push(9 + row);
        else gridMapping.push(-1);
    }
}
for (let col = 0; col < 10; col++) gridMapping.push(27 - col);

const players = [
    { id: 1, team: 0, hp: 5, position: 0 }, { id: 2, team: 0, hp: 5, position: 0 },
    { id: 3, team: 1, hp: 5, position: 9 }, { id: 4, team: 1, hp: 5, position: 9 },
    { id: 5, team: 2, hp: 5, position: 18 }, { id: 6, team: 2, hp: 5, position: 18 }
];

const teams = [{score:0, hand:[]}, {score:0, hand:[]}, {score:0, hand:[]}];
let currentTurnPlayer = 0;
let selectedCardIndex = null;

teams.forEach(t => { for(let i=0; i<4; i++) t.hand.push(cardPool[Math.floor(Math.random()*8)]); });

function initBoard() {
    const board = document.getElementById("board");
    const center = board.querySelector(".center-info");
    board.innerHTML = ""; board.appendChild(center);
    gridMapping.forEach(m => {
        if(m === -1) return;
        const d = mapConfig[m];
        const cell = document.createElement("div");
        cell.className = "cell " + d.type; cell.id = "cell-" + m;
        let gIcon = d.garbage ? d.garbage.icon : "";
        cell.innerHTML = `<span class="cell-name">${d.name}</span><div class="cell-info">${gIcon}</div><div class="player-container"></div>`;
        board.appendChild(cell);
    });
    renderHand(); updateUI();
}

function updateUI() {
    document.querySelectorAll('.player-container').forEach(el => el.innerHTML = '');
    players.forEach(p => {
        const container = document.querySelector("#cell-" + p.position + " .player-container");
        if (container) {
            const t = document.createElement("div");
            t.className = `player-token t${p.team}-token`; t.innerText = p.id;
            container.appendChild(t);
        }
    });
    for(let i=0; i<3; i++) document.getElementById(`t${i}-score`).innerText = teams[i].score;
    let hpStr = "";
    players.forEach((p, idx) => {
        hpStr += `P${p.id}:${p.hp} ${(idx+1)%3==0 ? '<br>' : '| '}`;
    });
    document.getElementById("p-hp-info").innerHTML = hpStr;
    const p = players[currentTurnPlayer];
    const teamColors = ["var(--accent-red)", "var(--accent-blue)", "var(--accent-green)"];
    document.getElementById("current-turn").innerText = `PLAYER ${p.id} 回合`;
    document.getElementById("current-turn").style.color = teamColors[p.team];
}

function renderHand() {
    const handBox = document.getElementById("hand-cards");
    handBox.innerHTML = ""; selectedCardIndex = null;
    teams[players[currentTurnPlayer].team].hand.forEach((card, idx) => {
        const c = document.createElement("div");
        c.className = "card-option";
        c.onclick = () => {
            document.querySelectorAll('.card-option').forEach(el => el.classList.remove('selected'));
            c.classList.add('selected'); selectedCardIndex = idx;
            if(document.getElementById("roll-btn").disabled) document.getElementById("card-btn").disabled = false;
        };
        c.innerHTML = `<b>${card.name}</b><span>${card.desc}</span>`;
        handBox.appendChild(c);
    });
}

function rollDice() {
    document.getElementById("roll-btn").disabled = true;
    const steps = Math.floor(Math.random() * 3) + 1;
    document.getElementById("dice-result").innerText = `骰子：${steps} 步`;
    const p = players[currentTurnPlayer];
    p.position = (p.position + steps) % 36;
    const cell = mapConfig[p.position];
    if(cell.garbage) { 
        teams[p.team].score += cell.garbage.score; 
        cell.garbage = null; 
        document.querySelector(`#cell-${p.position} .cell-info`).innerText = ""; 
    }
    document.getElementById("skip-card-btn").disabled = false;
    updateUI();
}

function playCard() {
    if(selectedCardIndex === null) return;
    const p = players[currentTurnPlayer];
    teams[p.team].hand[selectedCardIndex] = cardPool[Math.floor(Math.random()*8)];
    endTurn();
}
function skipCard() { endTurn(); }
function endTurn() {
    currentTurnPlayer = (currentTurnPlayer + 1) % 6;
    document.getElementById("roll-btn").disabled = false;
    document.getElementById("card-btn").disabled = true;
    document.getElementById("skip-card-btn").disabled = true;
    document.getElementById("dice-result").innerText = "";
    renderHand(); updateUI();
}

initBoard();
</script>
</body>
</html>
